<!DOCTYPE html>
<html lang="zh-TW">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>台灣郵遞區號與英譯查詢 | 快速精準的地址工具</title>
  <meta name="description" content="提供台灣 3+3 與 3+2 郵遞區號快速查詢，支援批量處理與地址英譯功能。">
  <link
    href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;900&family=JetBrains+Mono:wght@400;700&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --red: #C0392B;
      --red-dark: #96281B;
      --cream: #FAF6F0;
      --warm-white: #FDF9F4;
      --ink: #1A1208;
      --ink-light: #3D2B1F;
      --gold: #C8A951;
      --gray: #8C7B6E;
      --border: #D4C4B0;
      --shadow: rgba(26, 18, 8, 0.12);
    }

    [data-theme="dark"] {
      --red: #E05C4B;
      --red-dark: #C0392B;
      --cream: #1A1410;
      --warm-white: #221C16;
      --ink: #F0E6D8;
      --ink-light: #C8B9A8;
      --gold: #C8A951;
      --gray: #8C7B6E;
      --border: #3D2B1F;
      --shadow: rgba(0, 0, 0, 0.5);
    }

    [data-theme="dark"] body::before {
      background: repeating-linear-gradient(0deg, transparent, transparent 39px, rgba(224, 92, 75, 0.04) 39px, rgba(224, 92, 75, 0.04) 40px),
        repeating-linear-gradient(90deg, transparent, transparent 39px, rgba(224, 92, 75, 0.04) 39px, rgba(224, 92, 75, 0.04) 40px);
    }

    [data-theme="dark"] input[type="text"],
    [data-theme="dark"] textarea {
      background: var(--cream);
    }

    [data-theme="dark"] .result-card {
      background: linear-gradient(135deg, #2A211A 0%, var(--cream) 100%);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: var(--cream);
      font-family: 'Noto Serif TC', serif;
      color: var(--ink);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px 60px;
      position: relative;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(0deg, transparent, transparent 39px, rgba(192, 57, 43, 0.04) 39px, rgba(192, 57, 43, 0.04) 40px), repeating-linear-gradient(90deg, transparent, transparent 39px, rgba(192, 57, 43, 0.04) 39px, rgba(192, 57, 43, 0.04) 40px);
      pointer-events: none;
      z-index: 0;
    }

    .theme-switcher {
      position: fixed;
      top: 16px;
      right: 16px;
      z-index: 999;
      display: flex;
      gap: 2px;
      background: var(--warm-white);
      border: 1.5px solid var(--border);
      border-radius: 4px;
      padding: 3px;
      box-shadow: 0 2px 8px var(--shadow);
    }

    .theme-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 30px;
      height: 30px;
      border-radius: 3px;
      border: none;
      background: transparent;
      cursor: pointer;
      color: var(--gray);
      font-size: 15px;
      transition: all 0.15s;
    }

    .theme-btn:hover {
      background: rgba(192, 57, 43, 0.1);
      color: var(--red);
    }

    .theme-btn.active {
      background: var(--red);
      color: #fff;
    }

    .wrapper {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 680px;
    }

    header {
      text-align: center;
      margin-bottom: 44px;
      animation: fadeDown 0.6s ease both;
    }

    .stamp-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--red);
      color: #fff;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      letter-spacing: 3px;
      padding: 6px 16px;
      margin-bottom: 20px;
    }

    h1 {
      font-size: clamp(32px, 6vw, 52px);
      font-weight: 900;
      line-height: 1.1;
      letter-spacing: -1px;
    }

    h1 span {
      color: var(--red);
    }

    .subtitle {
      margin-top: 10px;
      font-size: 14px;
      color: var(--gray);
      letter-spacing: 1px;
    }

    .deco-line {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 20px auto 0;
      width: 200px;
    }

    .deco-line::before,
    .deco-line::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .deco-line span {
      color: var(--gold);
      font-size: 16px;
    }

    .card {
      background: var(--warm-white);
      border: 1.5px solid var(--border);
      border-radius: 2px;
      padding: 36px 40px;
      box-shadow: 0 4px 24px var(--shadow), 0 1px 0 var(--gold) inset;
      animation: fadeUp 0.6s 0.1s ease both;
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: '郵';
      position: absolute;
      top: -10px;
      right: 20px;
      font-size: 120px;
      font-weight: 900;
      color: var(--red);
      opacity: 0.04;
      line-height: 1;
      pointer-events: none;
    }

    .tabs {
      display: flex;
      gap: 10px;
      margin-bottom: 24px;
      border-bottom: 1px solid var(--border);
      padding-bottom: 8px;
    }

    .tab-btn {
      background: none;
      border: none;
      padding: 6px 12px;
      font-family: 'Noto Serif TC', serif;
      font-size: 14px;
      color: var(--gray);
      cursor: pointer;
      border-radius: 4px;
      transition: all 0.2s;
    }

    .tab-btn.active {
      color: var(--red);
      font-weight: 600;
      background: rgba(192, 57, 43, 0.05);
    }

    .field-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 18px;
    }

    label {
      font-size: 11px;
      letter-spacing: 2px;
      font-weight: 600;
      color: var(--gray);
      text-transform: uppercase;
      font-family: 'JetBrains Mono', monospace;
    }

    input[type="text"],
    textarea {
      width: 100%;
      padding: 13px 16px;
      border: 1.5px solid var(--border);
      border-radius: 2px;
      background: var(--cream);
      font-family: 'Noto Serif TC', serif;
      font-size: 16px;
      color: var(--ink);
      transition: border-color 0.2s;
    }

    input[type="text"]:focus,
    textarea:focus {
      outline: none;
      border-color: var(--red);
    }

    textarea {
      height: 120px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      resize: none;
    }

    .hint {
      font-size: 12px;
      color: var(--gray);
      margin-top: 6px;
      font-family: 'JetBrains Mono', monospace;
    }

    .hint code {
      background: rgba(192, 57, 43, 0.07);
      color: var(--red);
      padding: 1px 5px;
      border-radius: 2px;
    }

    .btn-lookup {
      width: 100%;
      padding: 15px;
      background: var(--red);
      color: #fff;
      border: none;
      border-radius: 2px;
      font-family: 'Noto Serif TC', serif;
      font-size: 16px;
      font-weight: 600;
      letter-spacing: 3px;
      cursor: pointer;
      transition: background 0.2s;
      position: relative;
      overflow: hidden;
    }

    .btn-lookup:hover {
      background: var(--red-dark);
    }

    .btn-lookup:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .spinner {
      display: inline-block;
      width: 18px;
      height: 18px;
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 8px;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .result-area {
      margin-top: 28px;
      animation: fadeUp 0.4s ease both;
    }

    .result-card {
      border: 1.5px solid var(--border);
      background: linear-gradient(135deg, #fff 0%, var(--cream) 100%);
      padding: 28px 32px;
      position: relative;
      border-radius: 2px;
      margin-bottom: 10px;
    }

    .result-card::before {
      content: '';
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 4px;
      background: var(--red);
    }

    .result-label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      letter-spacing: 3px;
      color: var(--gray);
      margin-bottom: 8px;
    }

    .result-zip {
      font-family: 'JetBrains Mono', monospace;
      font-size: 56px;
      font-weight: 700;
      color: var(--red);
      letter-spacing: 6px;
      line-height: 1;
      margin-bottom: 12px;
    }

    .result-addr {
      font-size: 15px;
      color: var(--ink-light);
      margin-bottom: 10px;
    }

    .result-note {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: var(--gray);
      margin-bottom: 16px;
    }

    .btn-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .copy-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 18px;
      border: 1.5px solid var(--red);
      color: var(--red);
      background: transparent;
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      cursor: pointer;
      border-radius: 2px;
      transition: all 0.2s;
      text-decoration: none;
    }

    .copy-btn:hover {
      background: var(--red);
      color: #fff;
    }

    .copy-btn.copied {
      background: #27AE60;
      border-color: #27AE60;
      color: #fff;
    }

    .error-msg {
      padding: 16px 20px;
      border: 1.5px solid #E74C3C;
      background: rgba(231, 76, 60, 0.05);
      color: var(--red);
      font-size: 14px;
      border-radius: 2px;
    }

    .bulk-progress {
      margin-top: 20px;
    }

    .progress-bar {
      width: 100%;
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      overflow: hidden;
      margin-bottom: 8px;
    }

    .progress-bar .fill {
      height: 100%;
      background: var(--red);
      width: 0%;
      transition: width 0.3s;
    }

    .progress-text {
      font-size: 11px;
      font-family: 'JetBrains Mono', monospace;
      color: var(--gray);
      text-align: center;
    }

    .bulk-results {
      margin-top: 20px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .bulk-row {
      padding: 10px;
      background: var(--warm-white);
      border: 1px solid var(--border);
      border-radius: 2px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 13px;
      flex-wrap: wrap;
    }

    .bulk-row.ok {
      border-left: 3px solid #27AE60;
    }

    .bulk-row.err {
      border-left: 3px solid #E74C3C;
    }

    .history-section {
      margin-top: 36px;
      animation: fadeUp 0.5s 0.2s ease both;
      width: 100%;
    }

    .section-title {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      letter-spacing: 3px;
      color: var(--gray);
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .section-title::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .history-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .history-item {
      display: flex;
      justify-content: space-between;
      padding: 10px 14px;
      background: var(--cream);
      border: 1px solid var(--border);
      font-size: 13px;
    }

    footer {
      margin-top: 48px;
      text-align: center;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: var(--gray);
    }

    @keyframes fadeDown {
      from {
        opacity: 0;
        transform: translateY(-16px);
      }

      to {
        opacity: 1;
        transform: none;
      }
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(12px);
      }

      to {
        opacity: 1;
        transform: none;
      }
    }
  </style>
</head>

<body>
  <div class="theme-switcher">
    <button class="theme-btn" id="themeAuto" onclick="setTheme('auto')">⬡</button>
    <button class="theme-btn" id="themeLight" onclick="setTheme('light')">☀</button>
    <button class="theme-btn" id="themeDark" onclick="setTheme('dark')">☾</button>
  </div>
  <div class="wrapper">
    <header>
      <div class="stamp-badge">R.O.C. POSTAL CODE</div>
      <h1>台灣<span>郵遞區號</span>查詢</h1>
      <div class="deco-line"><span>◈</span></div>
    </header>

    <div class="card">
      <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('single')">單筆查詢</button>
        <button class="tab-btn" onclick="switchTab('bulk')">批量查詢</button>
      </div>

      <div id="singleMode">
        <div class="field-group">
          <label>完整中文地址</label>
          <input type="text" id="addrInput" placeholder="例：台北市大安區信義路四段1號"
            onkeydown="if(event.key==='Enter') lookup()" />
        </div>
        <button class="btn-lookup" id="lookupBtn" onclick="lookup()">查詢郵遞區號</button>
      </div>

      <div id="bulkMode" style="display:none;">
        <div class="field-group">
          <label>多筆地址 (每行一筆)</label>
          <textarea id="bulkInput" placeholder="台北市大安區信義路四段1號&#10;新北市板橋區縣民大道二段8號"></textarea>
        </div>
        <button class="btn-lookup" id="bulkBtn" onclick="bulkLookup()">開始批量查詢</button>
        <div id="bulkProgress" class="bulk-progress" style="display:none;">
          <div class="progress-bar">
            <div id="progressFill" class="fill"></div>
          </div>
          <div id="progressText" class="progress-text">準備中...</div>
        </div>
      </div>

      <div id="resultArea" class="result-area" style="display:none;"></div>
    </div>

    <div class="history-section" id="historySection" style="display:none;">
      <div class="section-title">
        <span>查詢紀錄</span>
        <div style="margin-left:auto; display:flex; gap:8px;">
          <button class="copy-btn" style="padding:4px 8px; font-size:10px;" onclick="clearHistory()">清除</button>
        </div>
      </div>
      <div class="history-list" id="historyList"></div>
    </div>
    <footer>Powered by Antigravity Architecture</footer>
  </div>

  <script>
    const resultArea = document.getElementById('resultArea');
    let queryHistory = JSON.parse(localStorage.getItem('zipQueryHistory') || '[]');

    function switchTab(mode) {
      document.getElementById('singleMode').style.display = mode === 'single' ? 'block' : 'none';
      document.getElementById('bulkMode').style.display = mode === 'bulk' ? 'block' : 'none';
      document.querySelectorAll('.tab-btn').forEach((btn, idx) => btn.classList.toggle('active', (idx === 0 && mode === 'single') || (idx === 1 && mode === 'bulk')));
      resultArea.innerHTML = ''; resultArea.style.display = 'none';
    }

    async function lookup() {
      const addr = document.getElementById('addrInput').value.trim();
      if (!addr) return;
      if (addr.length < 5) {
        resultArea.style.display = 'block';
        resultArea.innerHTML = `<div class="error-msg">⚠ 請輸入更完整的地址（至少 5 個字）。</div>`;
        return;
      }
      const btn = document.getElementById('lookupBtn');
      btn.disabled = true; btn.innerHTML = `<span class="spinner"></span>查詢中...`;

      try {
        const res = await fetch(`https://zip5.5432.tw/zip5json.py?adrs=${encodeURIComponent(addr)}`);
        const data = await res.json();
        const zip6 = (data.zipcode6 || '').trim();
        const zip5 = (data.zipcode || '').trim();

        let displayHtml = '';
        if (zip6.length === 6) {
          const z3a = zip6.slice(0, 3), z3b = zip6.slice(3, 6);
          displayHtml = buildResultCard(z3a, z3b, addr, zip6);
          addHistory(`${z3a}-${z3b}`, addr);
        } else if (zip5.length >= 3) {
          const z3 = zip5.slice(0, 3), z2 = zip5.slice(3) || '00';
          displayHtml = buildResultCard(z3, z2, addr, zip5, true);
          addHistory(`${z3}-${z2}`, addr);
        } else {
          displayHtml = `<div class="error-msg">⚠ 查無此地址。</div>`;
        }

        resultArea.style.display = 'block';
        resultArea.innerHTML = displayHtml;
      } catch (err) {
        resultArea.style.display = 'block';
        resultArea.innerHTML = `<div class="error-msg">⚠ 網路錯誤</div>`;
      } finally {
        btn.disabled = false; btn.innerHTML = '查詢郵遞區號';
      }
    }

    async function bulkLookup() {
      const input = document.getElementById('bulkInput').value.trim();
      const addresses = input.split('\n').map(a => a.trim()).filter(a => a);
      if (!addresses.length) return;

      document.getElementById('bulkBtn').disabled = true;
      document.getElementById('bulkProgress').style.display = 'block';
      resultArea.innerHTML = '<div class="bulk-results" id="bulkResults"></div>';
      resultArea.style.display = 'block';
      const container = document.getElementById('bulkResults');

      let count = 0;
      for (const addr of addresses) {
        count++;
        document.getElementById('progressFill').style.width = `${(count / addresses.length) * 100}%`;
        document.getElementById('progressText').innerText = `正在查詢 (${count}/${addresses.length})`;

        try {
          const res = await fetch(`https://zip5.5432.tw/zip5json.py?adrs=${encodeURIComponent(addr)}`);
          const data = await res.json();
          const zip = data.zipcode6 || data.zipcode || 'N/A';
          const isOk = zip !== 'N/A' && zip.length >= 3;

          const row = document.createElement('div');
          row.className = `bulk-row ${isOk ? 'ok' : 'err'}`;
          row.innerHTML = `
            <div style="width:100%; display:flex; justify-content:space-between; align-items:center; margin-bottom:4px;">
              <span>📍 ${escHtml(addr)}</span>
              <div style="display:flex; gap:8px; align-items:center;">
                <strong style="color:var(--red);">${zip}</strong>
                ${isOk ? `<button class="copy-btn" style="padding:2px 6px; font-size:10px; border-color:var(--gold); color:var(--gold);" onclick="translateAddr('${escAttr(addr)}', this)">英譯</button>` : ''}
              </div>
            </div>`;
          container.appendChild(row);
          if (isOk) addHistory(zip, addr);
        } catch (e) { }
        await new Promise(r => setTimeout(r, 200));
      }
      document.getElementById('bulkBtn').disabled = false;
      document.getElementById('progressText').innerText = '完成！';
    }

    function buildResultCard(p1, p2, addr, fullZip, isWarn = false) {
      return `
        <div class="result-card">
          <div class="result-label">POSTAL CODE · ${isWarn ? '3+2' : '3+3'} 郵遞區號</div>
          <div class="result-zip">${p1}<span style="color:var(--border);font-weight:400;">-</span>${p2}</div>
          <div class="result-addr">📍 ${escHtml(addr)}</div>
          <div class="btn-row">
            <button class="copy-btn" onclick="cp('${fullZip}',this)">⎘ 複製區號</button>
            <button class="copy-btn" style="border-color:var(--gold); color:var(--gold);" onclick="translateAddr('${escAttr(addr)}', this)">🌎 英文地址翻譯</button>
          </div>
        </div>`;
    }

    // --- 核心：與 Proxy 溝通的英譯邏輯 ---
    async function translateAddr(addr, btn) {
      const originalText = btn.innerHTML;
      btn.disabled = true;
      btn.innerHTML = `<span class="spinner" style="border-top-color:var(--gold); width:12px; height:12px;"></span>...`;

      const parentCard = btn.closest('.result-card') || btn.closest('.bulk-row');
      let area = parentCard.querySelector('.english-addr-area');

      if (!area) {
        area = document.createElement('div');
        area.className = 'english-addr-area result-note';
        area.style.cssText = 'margin-top:12px; padding:10px; background:rgba(200,169,81,0.1); border-left:2px solid var(--gold); color:var(--ink-light); width:100%; display:none;';
        area.innerHTML = `
          <div style="font-size:10px; color:var(--gold); margin-bottom:4px;">ENGLISH ADDRESS</div>
          <div class="en-addr-text" style="font-family:'JetBrains Mono', monospace; font-size:13px; line-height:1.4;"></div>`;
        parentCard.appendChild(area);
      }

      const textElement = area.querySelector('.en-addr-text');

      try {
        // 呼叫 Serverless Function（需部署至 Vercel 才能運作，GitHub Pages 不支援）
        const response = await fetch(`/api/translate?address=${encodeURIComponent(addr)}`);
        if (!response.ok) throw new Error('翻譯 API 不可用（請確認部署至 Vercel）');
        const result = await response.json();

        if (result && result.success && result.data && result.data.english) {
          area.style.display = 'block';
          textElement.innerText = result.data.english;
          textElement.style.cursor = 'pointer';
          textElement.title = "點擊複製";
          textElement.onclick = () => cp(result.data.english, textElement);
        } else throw new Error(result.error || '回傳格式異常');
      } catch (err) {
        area.style.display = 'block';
        textElement.innerText = `⚠ 翻譯失敗: 請確認 Proxy 伺服器狀態 (${err.message})`;
        textElement.style.color = 'var(--red)';
      } finally {
        btn.disabled = false; btn.innerHTML = originalText;
      }
    }

    function cp(text, btn) {
      navigator.clipboard.writeText(text).then(() => {
        const orig = btn.innerHTML;
        btn.style.color = '#27AE60'; btn.innerHTML = '✓ 已複製！';
        setTimeout(() => { btn.style.color = ''; btn.innerHTML = orig; }, 2000);
      });
    }

    function addHistory(zip, addr) {
      if (queryHistory.length > 0 && queryHistory[0].addr === addr) return;
      queryHistory.unshift({ zip, addr });
      if (queryHistory.length > 10) queryHistory.pop();
      localStorage.setItem('zipQueryHistory', JSON.stringify(queryHistory));
      renderHistory();
    }

    function renderHistory() {
      const sec = document.getElementById('historySection');
      const list = document.getElementById('historyList');
      if (!queryHistory.length) { sec.style.display = 'none'; return; }
      sec.style.display = 'block'; list.innerHTML = '';
      queryHistory.forEach(h => {
        const div = document.createElement('div');
        div.className = 'history-item';
        div.innerHTML = `<span style="color:var(--red); font-weight:700;">${h.zip}</span><span style="color:var(--ink-light);">${h.addr}</span>`;
        list.appendChild(div);
      });
    }

    function clearHistory() { queryHistory = []; localStorage.removeItem('zipQueryHistory'); renderHistory(); }
    function escHtml(s) { return String(s).replace(/[&<>'"]/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": "&#39;", '"': '&quot;' }[c])); }
    function escAttr(s) { return String(s).replace(/'/g, "\\'"); }

    // 主題切換
    function setTheme(m) {
      localStorage.setItem('theme', m);
      document.documentElement.setAttribute('data-theme', (m === 'dark' || (m === 'auto' && window.matchMedia('(prefers-color-scheme: dark)').matches)) ? 'dark' : 'light');
      document.querySelectorAll('.theme-btn').forEach(b => b.classList.remove('active'));
      document.getElementById({ auto: 'themeAuto', light: 'themeLight', dark: 'themeDark' }[m]).classList.add('active');
    }
    (function () { setTheme(localStorage.getItem('theme') || 'auto'); renderHistory(); })();
  </script>
</body>

</html>
